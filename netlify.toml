[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.17.1"
  NPM_FLAGS = "--legacy-peer-deps"
  NPM_CONFIG_LEGACY_PEER_DEPS = "true"

[functions]
  node_bundler = "zisi"
  external_node_modules = ["firebase-admin", "web-push"]

[functions."push-schedule-events-due"]
  schedule = "@hourly"

[functions."push-schedule-cleaning-due"]
  schedule = "@hourly"

[functions."push-schedule-shopping-reminder"]
  schedule = "@hourly"

[functions."push-schedule-weekly-menu-reminder"]
  schedule = "@hourly"

[[redirects]]
  from = "/api/push/send-test"
  to = "/.netlify/functions/push-send-test"
  status = 200
  force = true

[[redirects]]
  from = "/api/push/send-reminder"
  to = "/.netlify/functions/push-send-reminder"
  status = 200
  force = true

[[redirects]]
  from = "/api/push/list-subscriptions"
  to = "/.netlify/functions/push-list-subscriptions"
  status = 200
  force = true

[[redirects]]
  from = "/api/push/send-cleaning-due"
  to = "/.netlify/functions/push-send-cleaning-due"
  status = 200
  force = true

[[redirects]]
  from = "/api/push/send-events-due"
  to = "/.netlify/functions/push-send-events-due"
  status = 200
  force = true

[[redirects]]
  from = "/api/push/send-shopping-reminder"
  to = "/.netlify/functions/push-send-shopping-reminder"
  status = 200
  force = true

[[redirects]]
  from = "/api/push/send-weekly-menu-reminder"
  to = "/.netlify/functions/push-send-weekly-menu-reminder"
  status = 200
  force = true
