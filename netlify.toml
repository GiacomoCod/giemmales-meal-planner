[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.17.1"
  NPM_FLAGS = "--legacy-peer-deps"
  NPM_CONFIG_LEGACY_PEER_DEPS = "true"

[functions]
  node_bundler = "zisi"
  external_node_modules = ["firebase-admin"]

[[redirects]]
  from = "/api/push/send-test"
  to = "/.netlify/functions/push-send-test"
  status = 200
  force = true
